<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Bugle | Spidey Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-bg"></div>

    <main class="content-wrapper">
        <header class="bugle-header">
            <h1 class="logo-text">The Daily Bugle</h1>
            <div class="sub-header">
                <span>VOL. 001 ... NO. 01</span>
                <span class="location">NEW YORK CITY</span>
                <span>PRICE: WITH GREAT POWER COMES GREAT RESPONSIBILITY</span>
            </div>
        </header>

    <section class="gallery-grid">
    <div class="bugle-card">
        <a href="https://www.smartcampus-plus.xyz/" target="_blank" class="card-link">
            <div class="image-frame">
                <img src="image1.png" alt="Spider-Man Shot">
            </div>
            <p class="caption">"THREAT OR MENACE?"</p>
        </a>
    </div>

    <div class="bugle-card">
        <a href="https://github.com/prateekna39" target="_blank" class="card-link">
            <div class="image-frame">
                <img src="image2.jpeg" alt="Spider-Man Shot">
            </div>
            <p class="caption">WEB-SLINGER SPOTTED</p>
        </a>
    </div>

    <div class="bugle-card">
        <a href="https://www.youtube.com/watch?v=Aq5WXmQQooo" target="_blank" class="card-link">
            <div class="image-frame">
                <img src="image3.jpg" alt="Spider-Man Shot">
            </div>
            <p class="caption">EXCLUSIVE FOOTAGE</p>
        </a>
    </div>
    </section>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <img class="lightbox-img" id="full-img">
    </div>

    <script src="script.js"></script>
    <audio id="bg-music" loop>
    <source src="music1.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
    </audio>

    <div id="music-control" style="position: fixed; bottom: 20px; left: 20px; z-index: 1000; cursor: pointer; background: rgba(230, 36, 41, 0.8); padding: 10px; border-radius: 50%; color: white; font-weight: bold;">
    🎵
</div>
</body>
</html>
